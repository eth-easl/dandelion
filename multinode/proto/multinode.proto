syntax = "proto3";
package multinode_proto;

message ActionStatus {
    bool success = 1;
    string message = 2;
}

// Node Information

enum EngineType {
    ENGINE_REQWEST = 0;
    ENGINE_CHERI = 1;
    ENGINE_PROCESS = 2;
    ENGINE_KVM = 3;
}

message Engine {
    EngineType engine_type = 1;
    uint32 engine_capacity = 2;
}

message NodeInfo {
    uint32 version = 1;
    repeated Engine engines = 2;
}

message DataItem {
    string ident = 1;
    uint32 key = 2;
    bytes data = 3;
}

message DataSet {
    string ident = 1;
    repeated DataItem items = 2;
}

message Invocation {
    uint32 invocation_id = 1;
    string function_id = 2;
    repeated DataSet data_sets = 3;
    bool caching = 4;
}

message RepeatedDataSets {
    repeated DataSet data_sets = 1;
}

message Response {
    uint32 invocation_id = 1;
    oneof response {
        string error_msg = 2;
        RepeatedDataSets data_sets = 3;
    }
}

// Message from remote node to get work or return completed tasks
message RemoteMessage {
    oneof remote_message {
        // Message to ask for more work, containing currently vailable resources
        NodeInfo work_request = 1;
        // Message containing the response for a specific function that was run 
        Response response = 2;
    }
}

// Messages to the remote node that asked for work
// Either responding with 
message QueueMessage {
   oneof queue_message {
        // Message to indicate that there currently is no work, if true, if false, signify that there would be work to ask for
        bool no_work = 1;
        // Message containing the work for one function
        Invocation invocation = 2;
        // TODO add message to cancel invocation
   }
}
